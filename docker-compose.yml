services:
  slimevr-init:
    image: busybox:1.36
    command: ["sh", "-c", "mkdir -p /gui_mount /config && chown -R 1000:1000 /gui_mount /config"]
    restart: "no"
    volumes:
      - slimevr-config:/config
      - slimevr-gui:/gui_mount

  slimevr:
    depends_on:
      slimevr-init:
        condition: service_completed_successfully
    build:
      context: ./slimevr
      args:
        SLIMEVR_VERSION: ${SLIMEVR_VERSION:-latest}
    container_name: slimevr
    restart: unless-stopped
    environment:
      - LIBGL_ALWAYS_INDIRECT=0
    network_mode: host
    privileged: true
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - dialout
      - video
      - ${SERIAL_GID:-984}
    volumes:
      - slimevr-config:/home/ubuntu/.config/dev.slimevr.SlimeVR
      - slimevr-gui:/gui_mount
      - /dev:/dev
      - /run/udev:/run/udev:ro
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'java .*slimevr.jar' > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    build: ./nginx
    container_name: slimevr_gui
    restart: unless-stopped
    environment:
      WEBGUI_PORT: ${WEBGUI_PORT:-8080}
    network_mode: host
    volumes:
      - slimevr-gui:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:${WEBGUI_PORT:-8080}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  slimevr-config:
  slimevr-gui:
