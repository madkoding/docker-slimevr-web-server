services:
  slimevr:
    build:
      context: ./slimevr
      args:
        SLIMEVR_VERSION: ${SLIMEVR_VERSION:-latest}
    container_name: slimevr
    restart: unless-stopped
    environment:
      - LIBGL_ALWAYS_INDIRECT=0
    network_mode: host
    privileged: true
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - dialout
      - video
    volumes:
      - slimevr-config:/root/.config/dev.slimevr.SlimeVR
      - slimevr-gui:/gui_mount
      - /dev:/dev
      - /run/udev:/run/udev:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    build: ./nginx
    container_name: slimevr_gui
    restart: unless-stopped
    environment:
      WEBGUI_PORT: ${WEBGUI_PORT:-8080}
    network_mode: host
    volumes:
      - slimevr-gui:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${WEBGUI_PORT:-8080}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  slimevr-config:
  slimevr-gui: